name: 每小時同步馬會數據

on:
  schedule:
    - cron: '0 * * * *' # 每個整點自動執行 (例如 1:00, 2:00...)
  workflow_dispatch:      # 讓你可以手動點擊「Run」按鈕來測試

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝必要工具
        run: pip install requests

      - name: 執行抓取程式 (執行你寫的 update_data.py)
        run: python update_data.py

      - name: 將抓到的 JSON 推送到 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 確保檔案存在，如果不存在就建立一個空的，避免 git add 失敗
          touch lotto_data.json 
          
          git add lotto_data.json
          
          # 檢查是否有變更，沒有變更就不 commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新六合彩數據" && git push)

          
